name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # DATABASE_URL isn't a real secret here — `prisma generate` (run via the
      # postinstall hook) only needs the schema file to produce the client
      # types; it never connects to a database. A dummy value keeps it from
      # erroring on a missing env var without requiring a real Postgres
      # instance in CI.
      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build
